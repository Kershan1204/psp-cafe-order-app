<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSP Cafe Order App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center">PSP Cafe Order App</h1>
    <p class="text-center">Welcome! Please fill in your order details below.</p>

    <form id="orderForm" class="mt-4">

        <!-- Name -->
        <div class="mb-3">
            <label>Customer Name</label>
            <input type="text" id="customerName" class="form-control">
        </div>

        <!-- Phone -->
        <div class="mb-3">
            <label>Phone Number</label>
            <input type="text" id="phoneNumber" class="form-control">
        </div>

        <!-- Food -->
        <div class="mb-3">
            <label>Food Item</label>
            <select id="foodItem" class="form-select">
                <option>Fried Rice</option>
                <option>Chicken Burger</option>
                <option>Sandwich</option>
            </select>
        </div>

        <!-- Quantity -->
        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" id="quantity" class="form-control">
        </div>

        <!-- Dine Option -->
        <div class="mb-3">
            <label>Dine Option</label><br>
            <input type="radio" name="dineOption" value="Dine In" checked> Dine In
            <input type="radio" name="dineOption" value="Take Away"> Take Away
        </div>

        <!-- Buttons -->
        <button type="button" id="btnSubmit" class="btn btn-success">Submit</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
        <button type="button" id="btnToggle" class="btn btn-warning">Hide / Show Summary</button>

    </form>

    <!-- Output (empty first) -->
    <div id="output" class="mt-4"></div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
